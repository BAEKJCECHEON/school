<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #5c7cfa;
            --accent2: #f06595;
            --text: #e8ecf4;
            --text-muted: #7880a0;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --radius: 18px;
            --font: 'Noto Sans KR', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 80px;
            overflow-x: hidden;
        }

        /* 게임 중 스크롤 완전 차단 */
        body.playing {
            overflow: hidden;
            touch-action: none;
        }

        .nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 36px;
            animation: fadeDown .6s ease both;
        }

        .nav-btn {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            transition: color .2s, border-color .2s, background .2s;
        }

        .nav-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(92,124,250,.08); }
        .nav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(92,124,250,.12); }

        header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown .6s ease both;
        }

        header .label {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
        }

        .hud {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            animation: fadeDown .6s .1s ease both;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hud-stat { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
        .hud-val { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.2; }
        .hud-sep { width: 1px; height: 32px; background: var(--border); }

        .timer-wrap {
            width: 100%;
            max-width: 560px;
            height: 5px;
            background: var(--surface2);
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
            animation: fadeDown .6s .15s ease both;
        }

        #timer-bar {
            height: 100%;
            border-radius: 4px;
            background: var(--accent);
            transition: width .5s linear, background .3s;
            width: 100%;
        }

        #msg {
            font-size: 13px;
            color: var(--text-muted);
            min-height: 20px;
            margin-bottom: 12px;
            text-align: center;
            animation: fadeDown .6s .2s ease both;
        }

        /* board-wrap이 터치 이벤트를 전부 흡수 */
        .board-wrap {
            position: relative;
            animation: fadeUp .6s .25s ease both;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-canvas {
            display: block;
            border-radius: 14px;
            cursor: crosshair;
        }

        #game-over {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow);
            animation: fadeUp .4s ease both;
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        #game-over h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; }
        #game-over .go-score { font-size: 48px; font-weight: 700; color: var(--accent); }
        #game-over p { color: var(--text-muted); font-size: 14px; }

        .btn-restart {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 100px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: 8px;
        }

        .btn-restart:hover { opacity: .85; }
        .btn-restart:active { transform: scale(.97); }

        .btn-reset-inline {
            font-family: var(--font);
            font-size: 12px;
            padding: 7px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color .2s, color .2s;
            animation: fadeUp .6s .3s ease both;
        }

        .btn-reset-inline:hover { border-color: var(--accent2); color: var(--accent2); }

        footer {
            margin-top: 36px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            opacity: .6;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 44px 32px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeUp .5s ease both;
        }

        #start-screen .apple-icon { font-size: 56px; line-height: 1; }
        #start-screen h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; }
        #start-screen p { font-size: 13px; color: var(--text-muted); line-height: 1.8; max-width: 320px; }

        .rule-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            text-align: left;
        }

        .rule-list li {
            background: var(--surface2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rule-list li span { font-size: 18px; }

        .btn-start {
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            padding: 14px 48px;
            border-radius: 100px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: 4px;
            letter-spacing: .5px;
        }

        .btn-start:hover { opacity: .85; }
        .btn-start:active { transform: scale(.97); }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn">🍱 급식</a>
    <a href="fortune.html" class="nav-btn">🔮 운세</a>
    <a href="apple.html" class="nav-btn active">🍎 사과게임</a>
</nav>

<header>
    <p class="label">Apple Puzzle Game</p>
    <h1>사과 게임</h1>
</header>

<div id="start-screen">
    <div class="apple-icon">🍎</div>
    <h2>사과 게임</h2>
    <p>드래그해서 합이 <strong style="color:var(--accent)">10</strong>이 되는 사과들을 선택하세요!</p>
    <ul class="rule-list">
        <li><span>🖱️</span> 마우스 또는 손가락으로 드래그</li>
        <li><span>🔢</span> 몇 개든 합이 10이면 터짐 (1+9, 5+5, 7+1+1+1 등)</li>
        <li><span>⏱️</span> 제한 시간 120초</li>
        <li><span>🏆</span> 많이 터트릴수록 고득점!</li>
    </ul>
    <button class="btn-start" onclick="startGame()">시작하기</button>
</div>

<div class="hud" id="hud" style="display:none;">
    <div class="hud-stat">
        <span class="hud-label">점수</span>
        <span class="hud-val" id="score">0</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-stat">
        <span class="hud-label">남은 시간</span>
        <span class="hud-val" id="time-left">120</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-stat">
        <span class="hud-label">터진 사과</span>
        <span class="hud-val" id="popped">0</span>
    </div>
</div>

<div class="timer-wrap" id="timer-wrap" style="display:none;">
    <div id="timer-bar"></div>
</div>
<div id="msg" style="display:none;"></div>

<div class="board-wrap" id="board-wrap" style="display:none;">
    <canvas id="game-canvas"></canvas>
</div>

<div id="game-over">
    <h2>게임 종료!</h2>
    <div class="go-score" id="go-score">0</div>
    <p id="go-desc"></p>
    <button class="btn-restart" onclick="initGame()">다시 시작</button>
</div>

<button class="btn-reset-inline" id="btn-reset" onclick="initGame()" style="margin-top:16px;display:none;">↺ 새 게임</button>

<footer>합이 10이 되도록 드래그하세요</footer>

<script>
const COLS = 17, ROWS = 10;
const TOTAL_TIME = 120;

const APPLE_COLORS = {
    1: '#e84040', 2: '#e8634a', 3: '#e88040',
    4: '#d4a017', 5: '#8ab825', 6: '#2aab6e',
    7: '#2a9ab8', 8: '#4a7be8', 9: '#8a4ae8'
};

const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
let CELL, BOARD_W, BOARD_H;

let apples      = [];
let score       = 0;
let poppedCount = 0;
let timeLeft    = TOTAL_TIME;
let timerInterval = null;
let gameActive  = false;

/* ── rAF loop: runs continuously while game is active ── */
let rafId = null;
function startLoop() {
    if (rafId) return;
    function loop() {
        draw();
        if (gameActive) rafId = requestAnimationFrame(loop);
        else rafId = null;
    }
    rafId = requestAnimationFrame(loop);
}
function stopLoop() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

/* ── resize ── */
function resize() {
    const maxW = Math.min(window.innerWidth - 32, 680);
    CELL    = Math.floor(maxW / COLS);
    BOARD_W = CELL * COLS;
    BOARD_H = CELL * ROWS;
    canvas.width  = BOARD_W;
    canvas.height = BOARD_H;
    canvas.style.width  = BOARD_W + 'px';
    canvas.style.height = BOARD_H + 'px';
    draw();
}
window.addEventListener('resize', () => { if (gameActive) resize(); });

/* ── start ── */
function startGame() {
    document.getElementById('start-screen').style.display  = 'none';
    document.getElementById('hud').style.display           = 'flex';
    document.getElementById('timer-wrap').style.display    = 'block';
    document.getElementById('msg').style.display           = 'block';
    document.getElementById('board-wrap').style.display    = 'block';
    document.getElementById('btn-reset').style.display     = '';
    initGame();
}

/* ── init ── */
function initGame() {
    stopLoop();
    clearInterval(timerInterval);

    score = 0; poppedCount = 0; timeLeft = TOTAL_TIME;
    gameActive = true;
    isDragging = false; selSet = new Set();

    document.getElementById('score').textContent     = '0';
    document.getElementById('time-left').textContent = TOTAL_TIME;
    document.getElementById('popped').textContent    = '0';
    document.getElementById('timer-bar').style.width      = '100%';
    document.getElementById('timer-bar').style.background = 'var(--accent)';
    document.getElementById('msg').textContent = '드래그해서 합이 10이 되는 사과를 선택하세요!';
    document.getElementById('game-over').style.display    = 'none';
    document.getElementById('hud').style.display          = 'flex';
    document.getElementById('timer-wrap').style.display   = 'block';
    document.getElementById('msg').style.display          = 'block';
    document.getElementById('board-wrap').style.display   = 'block';
    document.getElementById('btn-reset').style.display    = '';
    document.body.classList.add('playing');

    apples = [];
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
            apples.push({ r, c, val: Math.floor(Math.random() * 9) + 1, gone: false, popStart: 0 });

    resize();
    startLoop();

    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time-left').textContent = timeLeft;
        const pct = timeLeft / TOTAL_TIME * 100;
        document.getElementById('timer-bar').style.width = pct + '%';
        if      (pct < 20) document.getElementById('timer-bar').style.background = '#ff6b6b';
        else if (pct < 50) document.getElementById('timer-bar').style.background = '#ff9f43';
        else               document.getElementById('timer-bar').style.background = 'var(--accent)';
        if (timeLeft <= 0) endGame();
    }, 1000);
}

/* ── draw ── */
function draw() {
    ctx.clearRect(0, 0, BOARD_W, BOARD_H);

    ctx.strokeStyle = 'rgba(46,51,80,0.5)';
    ctx.lineWidth   = 0.5;
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(BOARD_W, r * CELL); ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, BOARD_H); ctx.stroke();
    }

    const now = performance.now();
    apples.forEach(a => {
        if (a.gone) return;

        const cx = a.c * CELL + CELL / 2;
        const cy = a.r * CELL + CELL / 2;
        const r  = CELL * 0.38;

        let scale = 1;
        if (a.popStart > 0) {
            const t = (now - a.popStart) / 300;
            scale = t < 0.5 ? 1 + t * 0.4 : Math.max(0, 1.2 - (t - 0.5) * 2.4);
            if (scale <= 0) { a.gone = true; return; }
        }

        const isSelected = selSet.has(a.r * COLS + a.c);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);

        if (isSelected) { ctx.shadowColor = '#5c7cfa'; ctx.shadowBlur = 14; }

        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = isSelected ? lighten(APPLE_COLORS[a.val]) : APPLE_COLORS[a.val];
        ctx.fill();

        const grad = ctx.createRadialGradient(-r*.3, -r*.3, r*.05, 0, 0, r);
        grad.addColorStop(0, 'rgba(255,255,255,0.25)');
        grad.addColorStop(1, 'rgba(0,0,0,0.15)');
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font      = `bold ${Math.round(r * 1.1)}px 'Noto Sans KR', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(a.val, 0, 1);
        ctx.restore();
    });

    /* selection rect */
    if (isDragging) {
        const rx = Math.min(dragStart.x, dragCur.x);
        const ry = Math.min(dragStart.y, dragCur.y);
        const rw = Math.abs(dragCur.x - dragStart.x);
        const rh = Math.abs(dragCur.y - dragStart.y);
        ctx.strokeStyle = 'rgba(92,124,250,0.9)';
        ctx.lineWidth   = 2;
        ctx.setLineDash([6, 3]);
        ctx.strokeRect(rx, ry, rw, rh);
        ctx.fillStyle = 'rgba(92,124,250,0.08)';
        ctx.fillRect(rx, ry, rw, rh);
        ctx.setLineDash([]);
    }
}

function lighten(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (n >> 16) + 60);
    const g = Math.min(255, ((n >> 8) & 0xff) + 60);
    const b = Math.min(255, (n & 0xff) + 60);
    return `rgb(${r},${g},${b})`;
}

/* ── Drag: listen on window so out-of-bounds drag still works ── */
let isDragging = false;
let dragStart  = { x: 0, y: 0 };
let dragCur    = { x: 0, y: 0 };
let selSet     = new Set();

function canvasPos(clientX, clientY) {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top)  * scaleY
    };
}

/* ── Mouse events on window ── */
window.addEventListener('mousedown', e => {
    if (!gameActive) return;
    /* canvas 위에서 시작한 경우만 드래그 시작 */
    if (e.target !== canvas) return;
    e.preventDefault();
    isDragging = true;
    dragStart  = canvasPos(e.clientX, e.clientY);
    dragCur    = { ...dragStart };
    selSet     = new Set();
    updateSelection();
});

window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    /* 어디서 움직이든 추적 */
    dragCur = canvasPos(e.clientX, e.clientY);
    updateSelection();
});

window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    tryPop();
    selSet = new Set();
});

/* ── Touch events: canvas에서 시작, window에서 이동·종료 ── */
let activeTouchId = null;

canvas.addEventListener('touchstart', e => {
    if (!gameActive) return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    activeTouchId = touch.identifier;
    isDragging = true;
    dragStart  = canvasPos(touch.clientX, touch.clientY);
    dragCur    = { ...dragStart };
    selSet     = new Set();
    updateSelection();
}, { passive: false });

window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            dragCur = canvasPos(t.clientX, t.clientY);
            updateSelection();
            break;
        }
    }
}, { passive: false });

window.addEventListener('touchend', e => {
    if (!isDragging) return;
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            isDragging    = false;
            activeTouchId = null;
            tryPop();
            selSet = new Set();
            break;
        }
    }
});

window.addEventListener('touchcancel', () => {
    if (!isDragging) return;
    isDragging    = false;
    activeTouchId = null;
    selSet        = new Set();
});

/* ── Selection ── */
function updateSelection() {
    const rx1 = Math.min(dragStart.x, dragCur.x);
    const rx2 = Math.max(dragStart.x, dragCur.x);
    const ry1 = Math.min(dragStart.y, dragCur.y);
    const ry2 = Math.max(dragStart.y, dragCur.y);

    selSet = new Set();
    apples.forEach(a => {
        if (a.gone) return;
        const cx = a.c * CELL + CELL / 2;
        const cy = a.r * CELL + CELL / 2;
        if (cx >= rx1 && cx <= rx2 && cy >= ry1 && cy <= ry2)
            selSet.add(a.r * COLS + a.c);
    });

    const sel = apples.filter(a => !a.gone && selSet.has(a.r * COLS + a.c));
    const msg = document.getElementById('msg');
    if (sel.length === 0) {
        msg.textContent = '드래그해서 합이 10이 되는 사과를 선택하세요!';
        return;
    }
    const sum = sel.reduce((s, a) => s + a.val, 0);
    if      (sum === 10) msg.textContent = `합계 ${sum} — 손을 떼면 터집니다!`;
    else if (sum  < 10) msg.textContent = `선택: ${sel.map(a=>a.val).join(' + ')} = ${sum} (${10-sum} 더 필요)`;
    else                msg.textContent = `선택: ${sel.map(a=>a.val).join(' + ')} = ${sum} (${sum-10} 초과)`;
}

/* ── Pop ── */
function tryPop() {
    const sel = apples.filter(a => !a.gone && selSet.has(a.r * COLS + a.c));
    if (sel.length === 0) return;
    const sum = sel.reduce((s, a) => s + a.val, 0);
    if (sum === 10) {
        const now = performance.now();
        sel.forEach(a => { a.popStart = now; });
        score       += sel.length * 10;
        poppedCount += sel.length;
        document.getElementById('score').textContent   = score;
        document.getElementById('popped').textContent  = poppedCount;
        document.getElementById('msg').textContent     = `${sel.length*10}점! (${sel.map(a=>a.val).join('+')}=10)`;
        setTimeout(() => {
            if (apples.filter(a => !a.gone).length === 0) endGame();
        }, 400);
    } else {
        document.getElementById('msg').textContent = `합계 ${sum} — 10이 아니에요!`;
    }
}

/* ── End ── */
function endGame() {
    clearInterval(timerInterval);
    gameActive = false;
    isDragging = false;
    stopLoop();
    draw();
    document.body.classList.remove('playing');
    document.getElementById('board-wrap').style.display = 'none';
    document.getElementById('btn-reset').style.display  = 'none';
    document.getElementById('game-over').style.display  = 'flex';
    document.getElementById('go-score').textContent     = score + '점';
    document.getElementById('go-desc').textContent      = `사과 ${poppedCount}개 터트림 • ${Math.round(poppedCount/COLS/ROWS*100)}% 클리어`;
}
</script>
</body>
</html>
