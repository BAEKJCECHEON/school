<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘 급식</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .schools {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .school {
            flex: 1;
            text-align: left;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .schools {
                flex-direction: column;
            }
        }

        .menu p {
            background: #f0f3ff;
            padding: 8px;
            border-radius: 8px;
            margin: 5px 0;
        }

        .empty {
            color: #888;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>오늘 급식</h1>
    <div id="date"></div>

    <div class="schools">

        <div class="school">
            <h2>용소중학교</h2>
            <div id="menu-yongso" class="menu"></div>
        </div>

        <div class="school">
            <h2>영광고등학교</h2>
            <div id="menu-younggwang" class="menu"></div>
        </div>

    </div>
</div>

<script>
    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");

    const today = `${year}-${month}-${day}`;

    document.getElementById("date").innerText =
        `${year}년 ${month}월 ${day}일`;

    function loadMeal(fileName, elementId) {
        fetch(fileName + "?v=" + Date.now())
            .then(res => res.json())
            .then(data => {
                const menu = data[today];
                const div = document.getElementById(elementId);

                if (!menu || menu.length === 0) {
                    div.innerHTML = `<p class="empty">급식 없음</p>`;
                    return;
                }

                div.innerHTML = menu.map(m => `<p>${m}</p>`).join("");
            })
            .catch(err => {
                document.getElementById(elementId).innerHTML =
                    `<p class="error">불러오기 실패</p>`;
                console.error(err);
            });
    }

    loadMeal(`yongso_${year}${month}.json`, "menu-yongso");
    loadMeal(`younggwang_${year}${month}.json`, "menu-younggwang");
</script>
</body>
</html>
