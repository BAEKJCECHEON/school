<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>급식 메뉴</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">

    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #5c7cfa;
            --accent2: #f06595;
            --text: #e8ecf4;
            --text-muted: #7880a0;
            --tag-bg: #1e2340;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --radius: 18px;
            --font: 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 80px;
        }

        .guestbook-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
            transition: color .2s, border-color .2s, background .2s, transform .15s;
            white-space: nowrap;
        }

        .guestbook-btn:hover {
            color: var(--accent2);
            border-color: var(--accent2);
            background: rgba(240, 101, 149, .08);
            transform: translateY(-1px);
        }

        .guestbook-btn .icon {
            font-size: 14px;
        }

        /* ── 헤더 ── */
        header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeDown .6s ease both;
        }

        header .label {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
        }

        /* ── 날짜 네비게이터 ── */
        .date-nav {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 18px;
            margin-bottom: 32px;
            animation: fadeDown .6s .1s ease both;
            box-shadow: var(--shadow);
        }

        .date-nav button {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--surface2);
            color: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s, transform .15s;
            -webkit-tap-highlight-color: transparent;
        }

        .date-nav button:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.08);
        }

        .date-nav button:disabled {
            opacity: .3;
            cursor: not-allowed;
            transform: none;
        }

        #date-display {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            min-width: 150px;
            text-align: center;
            cursor: pointer;
            transition: color .2s;
        }

        #date-display:hover {
            color: var(--accent);
        }

        #date-display .weekday {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── 날짜 피커 오버레이 ── */
        .picker-wrap {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }

        @media (min-width: 500px) {
            .picker-wrap {
                align-items: center;
            }
        }

        .picker-wrap.open {
            opacity: 1;
            pointer-events: all;
        }

        .picker-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 24px 20px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transform: translateY(100%);
            transition: transform .3s cubic-bezier(.32, 1, .23, 1);
        }

        @media (min-width: 500px) {
            .picker-box {
                border-radius: var(--radius);
                padding: 28px;
                width: min(360px, 92vw);
                transform: translateY(16px) scale(.97);
                transition: transform .25s;
            }

            .picker-wrap.open .picker-box {
                transform: translateY(0) scale(1);
            }
        }

        .picker-wrap.open .picker-box {
            transform: translateY(0);
        }

        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .picker-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .picker-header button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: color .2s;
        }

        .picker-header button:hover {
            color: var(--accent2);
        }

        .picker-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .picker-nav button {
            background: var(--surface2);
            border: none;
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: background .2s, color .2s;
            -webkit-tap-highlight-color: transparent;
        }

        .picker-nav button:hover {
            background: var(--accent);
            color: #fff;
        }

        .picker-month-label {
            font-size: 14px;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-head {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            padding: 4px 0;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text);
            transition: background .15s, color .15s;
            min-height: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .cal-day:hover {
            background: var(--accent);
            color: #fff;
        }

        .cal-day.today {
            background: var(--surface2);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .cal-day.selected {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
        }

        .cal-day.empty {
            pointer-events: none;
        }

        .cal-day.other-month {
            color: var(--text-muted);
            opacity: .4;
        }

        /* ── 카드 레이아웃 ── */
        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 100%;
            max-width: 820px;
            animation: fadeUp .6s .2s ease both;
        }

        @media (min-width: 600px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform .25s, box-shadow .25s;
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-4px);
                box-shadow: 0 16px 50px rgba(0, 0, 0, .6);
            }
        }

        .card-header {
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .card:nth-child(1) .card-icon {
            background: rgba(92, 124, 250, .18);
        }

        .card:nth-child(2) .card-icon {
            background: rgba(240, 101, 149, .18);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
        }

        .card-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-body {
            padding: 18px 22px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            line-height: 1.5;
            animation: itemIn .3s ease both;
        }

        .menu-item::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .card:nth-child(2) .menu-item::before {
            background: var(--accent2);
        }

        .badge-empty {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            padding: 10px 0;
        }

        .badge-error {
            color: #ff6b6b;
            font-size: 13px;
            padding: 10px 0;
        }

        .skeleton {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skel-line {
            height: 14px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        .skel-line:nth-child(2) {
            width: 80%;
        }

        .skel-line:nth-child(3) {
            width: 90%;
        }

        .skel-line:nth-child(4) {
            width: 70%;
        }

        /* ── Animations ── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            from {
                background-position: 200% 0;
            }
            to {
                background-position: -200% 0;
            }
        }

        @keyframes itemIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── 오늘로 돌아가기 버튼 ── */
        .today-btn {
            margin-top: 28px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 100px;
            font-family: var(--font);
            font-size: 12px;
            cursor: pointer;
            transition: border-color .2s, color .2s, background .2s;
            animation: fadeUp .6s .35s ease both;
            opacity: 0;
            animation-fill-mode: both;
        }

        .today-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(92, 124, 250, .08);
        }

        .today-btn.hidden {
            display: none;
        }

        footer {
            margin-top: 48px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            opacity: .6;
            animation: fadeUp .6s .4s ease both;
        }

        .nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 36px;
            animation: fadeDown .6s ease both;
        }

        .nav-btn {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            transition: color .2s, border-color .2s, background .2s;
        }

        .nav-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(92, 124, 250, .08);
        }

        .nav-btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(92, 124, 250, .12);
        }
    </style>
</head>

<body>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn active">🍱 급식</a>
    <a href="fortune.html" class="nav-btn">🔮 운세</a>
</nav>
<header>
    <p class="label">School Meal Planner</p>
    <h1>오늘의 급식</h1>
</header>

<!-- 날짜 네비게이터 -->
<nav class="date-nav">
    <button id="btn-prev" title="전날">&#8592;</button>
    <div id="date-display">
        <div id="date-text">로딩 중...</div>
        <div class="weekday" id="weekday-text"></div>
    </div>
    <button id="btn-next" title="다음날">&#8594;</button>
</nav>

<!-- 급식 카드 -->
<div class="cards">
    <div class="card">
        <div class="card-header">
            <div class="card-icon">🏫</div>
            <div>
                <div class="card-title">용소중학교</div>
                <div class="card-sub">중식</div>
            </div>
        </div>
        <div class="card-body">
            <div id="menu-yongso">
                <div class="skeleton">
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">🎓</div>
            <div>
                <div class="card-title">영광고등학교</div>
                <div class="card-sub">중식</div>
            </div>
        </div>
        <div class="card-body">
            <div id="menu-younggwang">
                <div class="skeleton">
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                    <div class="skel-line"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<button class="today-btn hidden" id="today-btn" onclick="goToday()">오늘로 돌아가기</button>

<footer>데이터 출처: 전북교육청 학교 급식 시스템</footer>

<!-- 날짜 피커 모달 -->
<div class="picker-wrap" id="picker-wrap" onclick="closePicker(event)">
    <div class="picker-box">
        <div style="width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px;"></div>
        <div class="picker-header">
            <h3>날짜 선택</h3>
            <button onclick="closePicker(null, true)">&#215;</button>
        </div>
        <div class="picker-nav">
            <button id="picker-prev">&#8592;</button>
            <span class="picker-month-label" id="picker-month-label"></span>
            <button id="picker-next">&#8594;</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <div class="cal-head">일</div>
            <div class="cal-head">월</div>
            <div class="cal-head">화</div>
            <div class="cal-head">수</div>
            <div class="cal-head">목</div>
            <div class="cal-head">금</div>
            <div class="cal-head">토</div>
        </div>
    </div>
</div>

<script>
    const WEEKDAYS = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

    const real = new Date();
    real.setHours(0, 0, 0, 0);

    let current = new Date(real);
    let pickerYear = current.getFullYear();
    let pickerMonth = current.getMonth();

    const cache = {};

    function fmt(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dy = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${dy}`;
    }

    function fmtLabel(d) {
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
        const dy = d.getDate();
        return `${y}년 ${m}월 ${dy}일`;
    }

    function isToday(d) {
        return fmt(d) === fmt(real);
    }

    function updateDateDisplay() {
        document.getElementById('date-text').textContent = fmtLabel(current);
        document.getElementById('weekday-text').textContent = WEEKDAYS[current.getDay()];
        const btn = document.getElementById('today-btn');
        if (isToday(current)) btn.classList.add('hidden');
        else btn.classList.remove('hidden');
    }

    function move(delta) {
        const d = new Date(current);
        d.setDate(d.getDate() + delta);
        current = d;
        updateDateDisplay();
        loadAll();
    }

    function goToday() {
        current = new Date(real);
        updateDateDisplay();
        loadAll();
    }

    document.getElementById('btn-prev').addEventListener('click', () => move(-1));
    document.getElementById('btn-next').addEventListener('click', () => move(+1));
    document.getElementById('date-display').addEventListener('click', openPicker);

    function openPicker() {
        pickerYear = current.getFullYear();
        pickerMonth = current.getMonth();
        renderCalendar();
        document.getElementById('picker-wrap').classList.add('open');
    }

    function closePicker(e, force) {
        if (force || (e && e.target === document.getElementById('picker-wrap')))
            document.getElementById('picker-wrap').classList.remove('open');
    }

    function renderCalendar() {
        const label = `${pickerYear}년 ${pickerMonth + 1}월`;
        document.getElementById('picker-month-label').textContent = label;

        const grid = document.getElementById('calendar-grid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(pickerYear, pickerMonth, 1).getDay();
        const daysInMonth = new Date(pickerYear, pickerMonth + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const el = document.createElement('div');
            el.className = 'cal-day empty';
            grid.appendChild(el);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const el = document.createElement('div');
            el.className = 'cal-day';
            el.textContent = d;

            const thisDate = new Date(pickerYear, pickerMonth, d);
            const thisStr = fmt(thisDate);
            const todayStr = fmt(real);
            const selStr = fmt(current);

            if (thisStr === todayStr) el.classList.add('today');
            if (thisStr === selStr) el.classList.add('selected');

            el.addEventListener('click', () => {
                current = new Date(pickerYear, pickerMonth, d);
                updateDateDisplay();
                loadAll();
                document.getElementById('picker-wrap').classList.remove('open');
            });
            grid.appendChild(el);
        }
    }

    document.getElementById('picker-prev').addEventListener('click', () => {
        pickerMonth--;
        if (pickerMonth < 0) {
            pickerMonth = 11;
            pickerYear--;
        }
        renderCalendar();
    });

    document.getElementById('picker-next').addEventListener('click', () => {
        pickerMonth++;
        if (pickerMonth > 11) {
            pickerMonth = 0;
            pickerYear++;
        }
        renderCalendar();
    });

    async function getJson(fileName) {
        if (cache[fileName]) return cache[fileName];
        const res = await fetch(fileName + '?v=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        cache[fileName] = data;
        return data;
    }

    function skeleton() {
        return `<div class="skeleton">
      <div class="skel-line"></div>
      <div class="skel-line"></div>
      <div class="skel-line"></div>
      <div class="skel-line"></div>
    </div>`;
    }

    function renderMenu(el, items) {
        if (!items || items.length === 0) {
            el.innerHTML = `<p class="badge-empty">급식 정보 없음</p>`;
            return;
        }
        el.innerHTML = `<ul class="menu-list">${
            items.map((m, i) =>
                `<li class="menu-item" style="animation-delay:${i * 40}ms">${m}</li>`
            ).join('')
        }</ul>`;
    }

    async function loadMeal(prefix, elementId) {
        const d = current;
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const key = fmt(d);
        const fileName = `${prefix}_${y}${m}.json`;
        const el = document.getElementById(elementId);

        el.innerHTML = skeleton();
        try {
            const data = await getJson(fileName);
            renderMenu(el, data[key]);
        } catch {
            el.innerHTML = `<p class="badge-error">⚠️ 불러오기 실패</p>`;
        }
    }

    function loadAll() {
        loadMeal('yongso', 'menu-yongso');
        loadMeal('younggwang', 'menu-younggwang');
    }

    updateDateDisplay();
    loadAll();
</script>
</body>
</html>
